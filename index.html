    <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Pro V13</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f2f5; --success: #27ae60; --danger: #e74c3c; 
                --color-A: #3498db; --color-B: #e67e22; --color-C: #9b59b6; --color-D: #1abc9c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--primary); }
        .container { max-width: 500px; margin: auto; padding-bottom: 40px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #e0e0e0; }
        h1, h2 { text-align: center; margin: 10px 0; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; text-align: center; text-decoration: none; color: white; }
        .btn-A { background: var(--color-A); }
        .btn-B { background: var(--color-B); }
        .btn-C { background: var(--color-C); }
        .btn-D { background: var(--color-D); }
        .btn-success { background: var(--success); }
        .btn-outline { background: white; border: 2px solid var(--accent); color: var(--accent); }
        .btn-small { width: auto; padding: 5px 10px; font-size: 11px; display: inline-block; margin: 0; border-radius: 5px; color: inherit; border: 1px solid #ccc; }
        .ex-header { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px; border-radius: 6px; margin-bottom: 8px; }
        .ex-title { font-size: 17px; font-weight: 800; }
        .history-text { font-size: 12px; color: #d35400; background: #fff5e6; padding: 8px; border-radius: 5px; margin-bottom: 10px; display: block; border-right: 3px solid #e67e22; line-height: 1.4; }
        .set-grid { display: grid; grid-template-columns: 45px 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 4px; }
        .note-input { width: 100%; padding: 6px; font-size: 12px; border: 1px dashed #ccc; border-radius: 5px; margin-bottom: 12px; background: #fffdf0; text-align: right; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; text-align: center; font-size: 16px; }
        .dt-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--accent); margin-bottom: 15px; font-size: 16px; }
        .hidden { display: none; }
        .counters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .counter-item { background: white; padding: 8px; border-radius: 10px; text-align: center; border-bottom: 4px solid #ccc; }
        .counter-val { display: block; font-size: 20px; font-weight: bold; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 999; pointer-events: none; }
        #toast.show { opacity: 1; bottom: 50px; }
        #last-workout-status { text-align: center; font-size: 14px; color: #555; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="toast">נשמר!</div>
    <div class="container">
        <div id="screen-home">
            <h1>האימונים שלי V13</h1>
            <div id="last-workout-status">טוען...</div>
            <div class="counters">
                <div class="counter-item" style="border-color: var(--color-A)">A<span class="counter-val" id="cntA">0</span></div>
                <div class="counter-item" style="border-color: var(--color-B)">B<span class="counter-val" id="cntB">0</span></div>
                <div class="counter-item" style="border-color: var(--color-C)">C<span class="counter-val" id="cntC">0</span></div>
                <div class="counter-item" style="border-color: var(--color-D)">D<span class="counter-val" id="cntD">0</span></div>
            </div>
            <div id="resume-zone" class="hidden">
                <button class="btn btn-success" style="background:#f39c12" onclick="resumeActive()">🔄 המשך אימון פעיל</button>
            </div>
            <button class="btn btn-A" onclick="initWorkout('A')">➕ אימון A חדש</button>
            <button class="btn btn-B" onclick="initWorkout('B')">➕ אימון B חדש</button>
            <button class="btn btn-C" onclick="initWorkout('C')">➕ אימון C חדש</button>
            <button class="btn btn-D" onclick="initWorkout('D')">➕ אימון D חדש</button>
            <hr>
            <button class="btn btn-outline" onclick="showScreen('screen-history')">📜 יומן אימונים</button>
            <button class="btn btn-outline" onclick="showScreen('screen-settings')">⚙️ ניהול תרגילים</button>
        </div>

        <div id="screen-workout" class="hidden">
            <h2 id="workout-label">אימון</h2>
            <input type="datetime-local" id="workout-dt" class="dt-input" onchange="syncDateTime()">
            <div id="exercise-list"></div>
            <button class="btn btn-success" onclick="finalizeWorkout()">💾 שמור אימון</button>
            <button class="btn" style="color:var(--danger); border:1px solid" onclick="showScreen('screen-home')">🔙 חזרה לבית (ללא שמירה)</button>
            <button class="btn" style="font-size:12px; color:#999;" onclick="discardActive()">🗑️ מחק אימון פעיל</button>
        </div>

        <div id="screen-history" class="hidden">
            <h2>יומן אימונים</h2>
            <div id="history-list"></div>
            <button class="btn btn-outline" onclick="exportCSV()">📤 ייצוא כל ההיסטוריה</button>
            <button class="btn btn-A" style="color:white" onclick="showScreen('screen-home')">חזרה לבית</button>
        </div>

        <div id="screen-settings" class="hidden">
            <h2>עריכת תרגילים</h2>
            <select id="edit-type" onchange="renderSettings()" class="dt-input">
                <option value="A">אימון A</option>
                <option value="B">אימון B</option>
                <option value="C">אימון C</option>
                <option value="D">אימון D</option>
            </select>
            <div id="settings-content"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="new-ex" placeholder="שם תרגיל...">
                <button class="btn btn-A" style="width:80px; margin:0; font-size:14px;" onclick="addNewEx()">הוסף</button>
            </div>
            <button class="btn btn-A" onclick="showScreen('screen-home')" style="margin-top:20px;">סיום</button>
        </div>
    </div>

    <script>
        const CURRENT_VERSION = 'V13';
        let data = {
            listA: ["סקוואט מפוצל עם רגליים אחוריות על ספסל", "סקוואט מפוצל בולגרי עם קפיצה", "לחיצת חזה עם משקולות", "חתירה עם משקולות", "פשיטות טרייספס מעבר לראש", "כפיפות ביספס", "פלאנק", "כפיפות בטן", "דלגית", "קפיצות כוח"],
            listB: ["דדליפט רגיל", "סקואט סומו", "חתירה בישיבה", "לחיצת חזה עם מוט", "הרחקת זרועות הצידה", "כפיפות ביספס", "דלגית", "קפיצות כוח"],
            listC: ["מכרעים", "סקוואט פוז", "לחיצת חזה בשיפוע חיובי", "פולי עליון באחיזה רחבה", "פשיטת זרועות לאחור עם משקולות", "פשיטת ברך במכונה", "כפיפות ביספס", "דלגית", "קפיצות כוח"],
            listD: ["דדליפט רומני", "סקוואט עמוק", "לחיצת חזה באחיזה צרה", "פולי עליון באחיזה צרה", "חתירה עם משקולות בשיפוע חיובי", "פלאנק", "כפיפות בטן", "דלגית", "קפיצות כוח"],
            history: [], active: null
        };
        let editingIndex = null;

        function loadData() {
            const stored = localStorage.getItem('workoutData_Final');
            if (stored) {
                data = JSON.parse(stored);
                // הגירה במידה ורשימות מסוימות חסרות
                ['listA', 'listB', 'listC', 'listD'].forEach(list => {
                    if (!data[list]) data[list] = [];
                });
            } else {
                // בדיקה אם קיימים נתונים בגרסה קודמת (V12)
                const storedOld = localStorage.getItem('workoutDataV12');
                if (storedOld) {
                    const oldData = JSON.parse(storedOld);
                    data.history = oldData.history || [];
                    saveData();
                } else {
                    saveData(); // יצירת נתונים התחלתיים
                }
            }
        }

        function saveData() { localStorage.setItem('workoutData_Final', JSON.stringify(data)); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.className = "show"; setTimeout(() => t.className = "", 2000); }
        
        function showScreen(id) { 
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
            if(id === 'screen-home') refreshHome();
            if(id === 'screen-history') renderHistory();
            if(id === 'screen-settings') renderSettings();
            window.scrollTo(0,0);
        }

        function refreshHome() { 
            ['A','B','C','D'].forEach(t => {
                document.getElementById('cnt'+t).innerText = data.history.filter(h => h.type === t).length;
            });
            document.getElementById('resume-zone').className = (data.active && editingIndex === null) ? '' : 'hidden';
            updateLastWorkoutStatus();
        }

        function updateLastWorkoutStatus() {
            const statusEl = document.getElementById('last-workout-status');
            if (data.history.length === 0) {
                statusEl.innerText = "עוד לא בוצעו אימונים. בהצלחה!";
                return;
            }
            const lastLog = [...data.history].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
            const dateStr = lastLog.date.split('T')[0].split('-').reverse().join('.');
            statusEl.innerHTML = `האימון האחרון שבוצע: <b> אימון ${lastLog.type} </b> בתאריך <b> ${dateStr} </b>`;
        }

        function initWorkout(type) {
            if(data.active && !confirm("יש אימון פעיל. להתחיל חדש?")) return;
            editingIndex = null;
            const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            data.active = { type, date: now.toISOString().slice(0,16), results: {}, setCounts: {} };
            saveData(); renderWorkoutView();
        }

        function resumeActive() { editingIndex = null; renderWorkoutView(); }

        function editOld(idx) {
            editingIndex = idx; const oldLog = data.history[idx];
            data.active = { type: oldLog.type, date: oldLog.date, results: {}, setCounts: {} };
            oldLog.data.forEach(ex => {
                data.active.setCounts[ex.name] = Math.max(3, ex.sets.length);
                ex.sets.forEach((s, i) => {
                    data.active.results[`w-${ex.name}-${i}`] = s.weight;
                    data.active.results[`r-${ex.name}-${i}`] = s.reps;
                    data.active.results[`n-${ex.name}-${i}`] = s.note || "";
                });
            });
            renderWorkoutView();
        }

        function renderWorkoutView() {
            document.getElementById('workout-label').innerText = 'אימון ' + data.active.type + (editingIndex !== null ? ' (עריכה)' : '');
            document.getElementById('workout-dt').value = data.active.date;
            const container = document.getElementById('exercise-list');
            const list = data['list' + data.active.type] || [];
            container.innerHTML = list.length ? '' : '<p style="text-align:center">אין תרגילים ברשימה. הוסיפי בהגדרות.</p>';

            list.forEach((ex) => {
                const hist = getSmartHistory(ex, data.active.date);
                const setsToRender = data.active.setCounts[ex] || 3;
                let setsHtml = `<div class="set-grid"><div></div><div style="font-size:10px;text-align:center;">ק"ג</div><div style="font-size:10px;text-align:center;">חזרות</div></div>`;
                for(let i=0; i < setsToRender; i++) {
                    const w = data.active.results[`w-${ex}-${i}`] || '', r = data.active.results[`r-${ex}-${i}`] || '', n = data.active.results[`n-${ex}-${i}`] || '';
                    setsHtml += `<div class="set-grid">
                        <div style="font-size:11px; color:#666;">סט ${i+1}</div>
                        <input type="number" value="${w}" placeholder="0" oninput="updateActive('${ex}', ${i}, 'w', this.value)">
                        <input type="number" value="${r}" placeholder="0" oninput="updateActive('${ex}', ${i}, 'r', this.value)">
                    </div><input type="text" class="note-input" value="${n}" placeholder="הערה לסט ${i+1}..." oninput="updateActive('${ex}', ${i}, 'n', this.value)">`;
                }
                container.innerHTML += `<div class="card"><div class="ex-header"><span class="ex-title">${ex}</span><button class="btn-small" onclick="addSetToEx('${ex}')">+ סט</button></div>${hist ? `<span class="history-text">${hist}</span>` : ''}<div id="sets-container-${ex}">${setsHtml}</div></div>`;
            });
            showScreen('screen-workout');
        }

        function updateActive(ex, idx, f, v) { data.active.results[`${f}-${ex}-${idx}`] = v; saveData(); }
        function addSetToEx(ex) { data.active.setCounts[ex] = (data.active.setCounts[ex] || 3) + 1; saveData(); renderWorkoutView(); }
        function syncDateTime() { data.active.date = document.getElementById('workout-dt').value; saveData(); }

        function getSmartHistory(ex, currentDt) {
            const eligible = data.history.filter(log => new Date(log.date) < new Date(currentDt) && log.data.some(d => d.name === ex));
            if (!eligible.length) return null;
            eligible.sort((a, b) => new Date(b.date) - new Date(a.date));
            const lastEx = eligible[eligible.length-1].data.find(d => d.name === ex);
            
            const setsStr = lastEx.sets.map((s, i) => `סט ${i+1}: ${s.weight}x${s.reps}`).join(' | ');
            const notesArray = lastEx.sets.map((s, i) => s.note ? `${i+1}: ${s.note}` : null).filter(n => n);
            const notesStr = notesArray.length ? `(${notesArray.join(', ')})` : '';

            return `🕒 פעם קודמת:<br>${setsStr}${notesStr ? `<br>${notesStr}` : ''}`;
        }

        function finalizeWorkout() {
            const list = data['list' + data.active.type];
            const finalData = list.map(ex => {
                let sets = [];
                for(let i=0; i < (data.active.setCounts[ex] || 3); i++) {
                    const w = data.active.results[`w-${ex}-${i}`], r = data.active.results[`r-${ex}-${i}`], n = data.active.results[`n-${ex}-${i}`];
                    if(w || r || n) sets.push({ weight: w||0, reps: r||0, note: n||"" });
                }
                return { name: ex, sets };
            }).filter(e => e.sets.length > 0);

            if(!finalData.length) return alert("הזיני נתונים לאימון");
            const obj = { date: data.active.date, type: data.active.type, data: finalData };
            if (editingIndex !== null) data.history[editingIndex] = obj; else data.history.push(obj);
            data.active = null; editingIndex = null; saveData(); showToast("נשמר! 🏆"); showScreen('screen-home');
        }

        function discardActive() { if(confirm("למחוק אימון פעיל?")) { data.active = null; editingIndex = null; saveData(); showScreen('screen-home'); } }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            [...data.history].sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(log => {
                const realIdx = data.history.indexOf(log);
                const dateStr = log.date.split('T')[0].split('-').reverse().join('.');
                let detail = log.data.map(e => `<b>${e.name}:</b> ${e.sets.map(s => s.weight+'x'+s.reps + (s.note ? ' 💬':'')).join(', ')}`).join('<br>');
                container.innerHTML += `<div class="card" style="border-right: 6px solid var(--color-${log.type})">
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><b>אימון ${log.type}</b><span>${dateStr}</span></div>
                    <div style="font-size:13px; margin:10px 0; line-height:1.5;">${detail}</div>
                    <div style="display:flex; gap:10px;"><button class="btn-small" onclick="editOld(${realIdx})">✏️ ערוך</button>
                    <button class="btn-small" onclick="exportSingleCSV(${realIdx})">📥 אקסל</button>
                    <button style="color:red; background:none; border:none; font-size:12px;" onclick="delLog(${realIdx})">🗑️ מחק</button></div></div>`;
            });
        }

        function delLog(idx) { if(confirm("למחוק?")) { data.history.splice(idx,1); saveData(); renderHistory(); } }

        function renderSettings() {
            const type = document.getElementById('edit-type').value;
            const list = data['list' + type];
            const container = document.getElementById('settings-content');
            container.innerHTML = list.length ? '' : '<p style="text-align:center">אין תרגילים.</p>';
            list.forEach((ex, idx) => {
                container.innerHTML += `<div style="display:flex; justify-content:space-between; background:#fff; padding:8px; margin-bottom:5px; border-radius:8px; border:1px solid #ddd; align-items:center;">
                    <span style="font-size:14px">${ex}</span><div style="display:flex; gap:5px;"><button onclick="renameEx(${idx},'${type}')">✏️</button>
                    <button onclick="moveEx(${idx},-1,'${type}')">↑</button><button onclick="moveEx(${idx},1,'${type}')">↓</button>
                    <button onclick="removeEx(${idx},'${type}')" style="color:red">🗑️</button></div></div>`;
            });
        }

        function renameEx(idx, t) { const n = prompt("שם חדש:", data['list'+t][idx]); if(n) { data['list'+t][idx] = n.trim(); saveData(); renderSettings(); } }
        function addNewEx() { 
            const i = document.getElementById('new-ex'), n = i.value.trim(), t = document.getElementById('edit-type').value;
            if(n) { data['list'+t].push(n); i.value = ''; saveData(); renderSettings(); }
        }
        function removeEx(idx, t) { if(confirm("למחוק תרגיל מהרשימה?")) { data['list'+t].splice(idx,1); saveData(); renderSettings(); } }
        function moveEx(idx, d, t) { const l = data['list'+t]; if(idx+d >= 0 && idx+d < l.length) { [l[idx], l[idx+d]] = [l[idx+d], l[idx]]; saveData(); renderSettings(); } }

        function exportCSV() { downloadCSV(generateCSV(data.history), "history_full.csv"); }
        function exportSingleCSV(idx) { 
            const log = data.history[idx];
            downloadCSV(generateCSV([log]), `workout_${log.date.split('T')[0]}.csv`); 
        }
        function generateCSV(arr) {
            let csv = "\uFEFFתאריך,סוג,תרגיל,סט,משקל,חזרות,הערה\n";
            arr.forEach(log => log.data.forEach(ex => ex.sets.forEach((s, i) => {
                csv += `${log.date},${log.type},"${ex.name}",${i+1},${s.weight},${s.reps},"${s.note || ''}"\n`;
            })));
            return csv;
        }
        function downloadCSV(csv, f) { const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = f; l.click(); }

        loadData();
        refreshHome();
    </script>
</body>
</html>
